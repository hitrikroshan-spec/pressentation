<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Visionneuse Faso - Firebase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; overflow: hidden; -webkit-user-select: none; user-select: none; }
        
        .iphone-container { width: 100%; max-width: 414px; background: #000; height: 100vh; position: relative; overflow: hidden; display: flex; flex-direction: column; }

        /* Barre de contrôle supérieure */
        .top-nav { position: absolute; top: 50px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 50; transition: opacity 0.3s; }
        .view-switch { background: rgba(255,255,255,0.1); padding: 5px; border-radius: 12px; display: flex; backdrop-filter: blur(10px); }
        .view-switch button { background: none; border: none; color: white; padding: 5px 15px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; transition: 0.3s; }
        .view-switch button.active { background: #6c5ce7; }

        .filter-bar { display: flex; justify-content: center; gap: 8px; }
        .btn-filter { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: 600; cursor: pointer; }
        .btn-filter.active { background: #fff; color: #000; }

        /* MODE SLIDE */
        .gallery-wrapper { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; transition: all 0.3s ease; }
        .gallery-wrapper::-webkit-scrollbar { display: none; }
        .photo-slide { min-width: 100%; height: 100%; position: relative; scroll-snap-align: center; display: flex; align-items: center; justify-content: center; }
        .photo-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* MODE CARTE (Grille) */
        .grid-mode { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 160px 15px 40px; overflow-y: auto; height: 100vh; scroll-snap-type: none; background: #111; }
        .grid-mode .photo-slide { height: 220px; min-width: auto; flex-direction: column; border-radius: 15px; overflow: hidden; background: #222; }
        .grid-mode img { height: 140px; width: 100%; object-fit: cover; }
        .grid-mode .overlay-info { position: relative; padding: 10px; background: #222; height: 80px; visibility: visible !important; opacity: 1 !important; }
        .grid-mode .photo-title { font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .grid-mode .photo-date { font-size: 0.6rem; }

        /* Navigation */
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 30; background: rgba(255,255,255,0.1); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .btn-prev { left: 10px; } .btn-next { right: 10px; }
        
        /* Infos Superposées (Diapo) */
        .overlay-info { position: absolute; top: 0; left: 0; right: 0; padding: 50px 20px 30px; z-index: 20; color: white; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%); transition: opacity 0.3s; }
        .photo-title { font-weight: 600; font-size: 1.1rem; }
        .photo-date { font-size: 0.65rem; opacity: 0.6; }

        /* Masquage UI */
        .hide-ui .top-nav, .hide-ui .nav-btn, .hide-ui .overlay-info { opacity: 0; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="iphone-container" id="mainFrame">
    <div class="top-nav">
        <div class="view-switch">
            <button id="btnSlide" class="active" onclick="switchView('slide')">Diapo</button>
            <button id="btnGrid" onclick="switchView('grid')">Cartes</button>
        </div>

        <div class="filter-bar">
            <button class="btn-filter active" onclick="filterGallery('TOUT', this)">TOUT</button>
            <button class="btn-filter" onclick="filterGallery('RECITATION', this)">RECITATION</button>
            <button class="btn-filter" onclick="filterGallery('CHANT', this)">CHANT</button>
        </div>
    </div>

    <button class="nav-btn btn-prev" id="prevBtn" onclick="moveSlide(-1)">❮</button>
    <button class="nav-btn btn-next" id="nextBtn" onclick="moveSlide(1)">❯</button>

    <div class="gallery-wrapper" id="galleryArea"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://presentation-c55d7-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const wrapper = document.getElementById('galleryArea');
    let currentFilter = 'TOUT';
    let currentView = 'slide';
    let allPhotosData = [];

    db.ref('galeriePhotos').on('value', (snapshot) => {
        const data = snapshot.val();
        allPhotosData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
        displayGallery();
    });

    function displayGallery() {
        const filtered = currentFilter === 'TOUT' 
            ? allPhotosData 
            : allPhotosData.filter(p => p.categorie === currentFilter);

        if (filtered.length === 0) {
            wrapper.innerHTML = `<div style="color:#444; width:100%; text-align:center; margin-top:45vh;">Aucun contenu</div>`;
            return;
        }

        // Note: l'index est passé à la fonction handleClick
        wrapper.innerHTML = filtered.reverse().map((p, index) => `
            <div class="photo-slide" onclick="handleClick(${index})">
                <img src="${p.src}" alt="photo">
                <div class="overlay-info">
                    <div style="font-size:0.5rem; text-transform:uppercase; color:#6c5ce7; font-weight:bold;">${p.categorie}</div>
                    <div class="photo-title">${p.titre}</div>
                    <div class="photo-date">${p.date}</div>
                </div>
            </div>
        `).join('');

        updateViewUI();
    }

    // GESTION DU CLIC SUR UNE IMAGE / CARTE
    function handleClick(index) {
        if (currentView === 'grid') {
            // Si on est en mode grille, on bascule en mode diapo
            switchView('slide');
            // On fait défiler jusqu'à l'image cliquée
            setTimeout(() => {
                wrapper.scrollTo({
                    left: index * wrapper.clientWidth,
                    behavior: 'instant'
                });
            }, 50);
        } else {
            // Si on est déjà en diapo, on cache/affiche l'UI
            document.getElementById('mainFrame').classList.toggle('hide-ui');
        }
    }

    function switchView(view) {
        currentView = view;
        document.getElementById('btnSlide').classList.toggle('active', view === 'slide');
        document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
        
        if(view === 'grid') {
            wrapper.classList.add('grid-mode');
            document.getElementById('mainFrame').classList.remove('hide-ui');
        } else {
            wrapper.classList.remove('grid-mode');
        }
        updateViewUI();
    }

    function updateViewUI() {
        const isGrid = currentView === 'grid';
        document.getElementById('prevBtn').style.display = isGrid ? 'none' : 'flex';
        document.getElementById('nextBtn').style.display = isGrid ? 'none' : 'flex';
        if(isGrid) wrapper.scrollLeft = 0;
    }

    function filterGallery(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        displayGallery();
    }

    function moveSlide(direction) {
        wrapper.scrollBy({ left: direction * wrapper.clientWidth, behavior: 'smooth' });
    }
</script>
</body>
</html>
